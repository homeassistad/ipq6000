name: AX5 NSS Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y \
        build-essential clang flex bison g++ gawk gcc-multilib gettext git \
        libncurses-dev libssl-dev python3 python3-distutils rsync unzip zlib1g-dev \
        file wget curl cmake ninja-build ccache swig xsltproc

    - name: Clone Source
      run: |
        git clone https://github.com/LiBwrt/openwrt-6.x.git
        cd openwrt-6.x
        git checkout 25.12-nss

    - name: Add Feeds
      run: |
        cd openwrt-6.x
        sed -i '1i src-git kenzo https://github.com/kenzok8/openwrt-packages' feeds.conf.default
        sed -i '2i src-git small https://github.com/kenzok8/small' feeds.conf.default

    - name: Update Feeds
      run: |
        cd openwrt-6.x
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Apply Config
      run: |
        cp .config openwrt-6.x/.config
        cd openwrt-6.x
        make defconfig

    - name: Change Default IP
      run: |
        cd openwrt-6.x
        sed -i 's/192.168.1.1/192.168.2.3/g' package/base-files/files/bin/config_generate

    - name: Add Swap
      run: |
        sudo fallocate -l 8G /swapfile
        sudo chmod 600 /swapfile
        sudo mkswap /swapfile
        sudo swapon /swapfile

    - name: Build
      run: |
        cd openwrt-6.x
        make -j$(nproc) V=s

    - name: Upload Firmware
      uses: actions/upload-artifact@v4
      with:
        name: AX5-Firmware
        path: openwrt-6.x/bin/targets/
