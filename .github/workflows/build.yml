name: Build OpenWrt AX5 NSS

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache dl
        uses: actions/cache@v4
        with:
          path: openwrt-6.x/dl
          key: dl-${{ github.ref }}
          restore-keys: |
            dl-

      - name: Cache ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ github.ref }}
          restore-keys: |
            ccache-

      - name: Install Full Dependencies
        run: |
          sudo apt update
          sudo apt install -y ack antlr3 asciidoc autoconf automake autopoint \
          binutils bison build-essential bzip2 ccache cmake cpio curl \
          device-tree-compiler fastjar flex gawk gettext gcc-multilib \
          g++-multilib git gperf haveged help2man intltool \
          libc6-dev-i386 libelf-dev libglib2.0-dev libgmp3-dev \
          libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev \
          libncursesw5-dev libreadline-dev libfuse-dev libssl-dev \
          libtool lrzsz genisoimage msmtp nano ninja-build \
          p7zip p7zip-full patch pkgconf python3 python3-pip \
          libpython3-dev qemu-utils rsync scons squashfs-tools \
          subversion swig texinfo uglifyjs unzip vim wget \
          xmlto xxd zlib1g-dev file

      - name: Clone Source
        run: |
          git clone https://github.com/LiBwrt/openwrt-6.x.git
          cd openwrt-6.x
          git checkout 25.12-nss

      - name: Update Feeds
        run: |
          cd openwrt-6.x
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Apply Config
        run: |
          cp .config openwrt-6.x/.config
          cd openwrt-6.x
          echo "CONFIG_CCACHE=y" >> .config
          make defconfig

      - name: Download Packages
        run: |
          cd openwrt-6.x
          make download -j$(nproc)

      - name: Compile
        run: |
          cd openwrt-6.x
          make -j$(($(nproc)-1)) V=s

      - name: Upload Firmware
        uses: actions/upload-artifact@v4
        with:
          name: AX5-OpenWrt-Firmware
          path: openwrt-6.x/bin/targets/
